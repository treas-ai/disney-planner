name: disney_planner
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.4.2
  path: ^1.9.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/master/
    - assets/master/tdl/
    - assets/data/attractions.json
    - assets/data/restaurants.json
    - assets/data/shops.json
    - assets/data/shows.json