name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Determine GitHub Pages base path
        id: base_path
        shell: bash
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPOSITORY_NAME" = "$OWNER_NAME.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPOSITORY_NAME/"
          fi

          echo "base_href=$BASE_HREF" >> "$GITHUB_OUTPUT"
          echo "GitHub Pages base href: $BASE_HREF"

      - name: Build Flutter Web
        run: >
          flutter build web
          --release
          --base-href "${{ steps.base_path.outputs.base_href }}"

      - name: Create no-Jekyll marker
        shell: bash
        run: touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4